<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revival Detailing</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,Arial,sans-serif;background:#0a0a0a;color:#fff}

header{position:fixed;width:100%;top:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;z-index:100}
header h1{color:#fff;font-size:18px;letter-spacing:1px}
nav a{margin-left:20px;color:#aaa;text-decoration:none;font-size:14px}
nav a:hover{color:#fff}

.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.95)),url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover}
.hero h2{font-size:48px;font-weight:600}
.hero p{opacity:.7;margin-top:10px}
.hero button{margin-top:20px;padding:12px 25px;border:none;background:#fff;color:#000;border-radius:30px;cursor:pointer}

section{padding:80px 20px;text-align:center}
.container{max-width:1100px;margin:auto}

.services{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:30px}
.service{background:#111;padding:25px;border-radius:12px;transition:.3s}
.service:hover{background:#1a1a1a}

.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-top:20px}
.gallery img{width:100%;border-radius:10px}

.review{margin-top:20px;opacity:.8}

.contact input,.contact textarea{width:100%;padding:12px;margin:10px 0;border-radius:6px;border:none;background:#111;color:#fff}
.contact button{padding:12px;background:#fff;color:#000;border:none;border-radius:25px}

.admin{background:#000;padding:20px;border-top:1px solid #333;text-align:center}

.hidden{opacity:0;transform:translateY(40px);transition:all .8s}
.show{opacity:1;transform:translateY(0)}

@media(max-width:600px){
.hero h2{font-size:32px}
}
</style>
</head>

<body>

<header>
<h1 contenteditable="true" id="title">Revival Detailing</h1>
<nav>
<a href="#services">Services</a>
<a href="#gallery">Gallery</a>
<a href="#reviews">Reviews</a>
<a href="#contact">Contact</a>
</nav>
</header>

<div class="hero">
<h2 contenteditable="true" id="hero">Premium Mobile Detailing</h2>
<p contenteditable="true" id="subhero">We bring your car back to life</p>
<button>Book Now</button>
</div>

<section id="services" class="hidden">
<div class="container">
<h2 contenteditable="true" id="servicesTitle">Services</h2>
<div class="services">
<div class="service" contenteditable="true">Basic Wash - $25</div>
<div class="service" contenteditable="true">Interior Detail - $75</div>
<div class="service" contenteditable="true">Full Detail - $150</div>
</div>
</div>
</section>

<section id="gallery" class="hidden">
<div class="container">
<h2>Gallery</h2>
<input type="file" id="upload" multiple>
<div class="gallery" id="galleryBox"></div>
</div>
</section>

<section id="reviews" class="hidden">
<div class="container">
<h2 contenteditable="true" id="reviewsTitle">Reviews</h2>
<p contenteditable="true" id="reviewsText" class="review">"Amazing results every time" ⭐⭐⭐⭐⭐</p>
</div>
</section>

<section id="contact" class="hidden">
<div class="container contact">
<h2 contenteditable="true" id="contactTitle">Contact</h2>
<input placeholder="Your Name">
<input placeholder="Your Phone">
<textarea placeholder="Message"></textarea>
<button>Send</button>
</div>
</section>

<div class="admin">
<button onclick="save()">Save Changes</button>
<button onclick="clearImgs()">Clear Images</button>
</div>

<script>
// LOAD
window.onload=()=>{
['title','hero','subhero','servicesTitle','reviewsTitle','reviewsText','contactTitle'].forEach(id=>{
if(localStorage.getItem(id))document.getElementById(id).innerText=localStorage.getItem(id);
});
(JSON.parse(localStorage.getItem('imgs'))||[]).forEach(addImg);
}

// SAVE
function save(){
['title','hero','subhero','servicesTitle','reviewsTitle','reviewsText','contactTitle'].forEach(id=>{
localStorage.setItem(id,document.getElementById(id).innerText);
});
alert('Saved');
}

// IMAGES
upload.onchange=()=>{
let imgs=JSON.parse(localStorage.getItem('imgs'))||[];
Array.from(upload.files).forEach(f=>{
let r=new FileReader();
r.onload=e=>{imgs.push(e.target.result);localStorage.setItem('imgs',JSON.stringify(imgs));addImg(e.target.result)};
r.readAsDataURL(f);
});
}

function addImg(src){let i=document.createElement('img');i.src=src;galleryBox.appendChild(i)}
function clearImgs(){localStorage.removeItem('imgs');galleryBox.innerHTML=''}

// SCROLL ANIM
const obs=new IntersectionObserver(e=>e.forEach(x=>x.isIntersecting&&x.target.classList.add('show')));
document.querySelectorAll('.hidden').forEach(el=>obs.observe(el));
</script>

</body>
</html>
